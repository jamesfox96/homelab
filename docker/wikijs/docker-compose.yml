services:
  wikijs-db:
    image: postgres:15-alpine
    container_name: wikijs-db
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: ${WIKI_DB_USER}
      POSTGRES_PASSWORD: ${WIKI_DB_PASSWORD}
    volumes:
      - ${APPDATA}/wikijsdb/db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U ${WIKI_DB_USER} -d wiki"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: wikijs
    depends_on:
      wikijs-db:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      DB_TYPE: postgres
      DB_HOST: wikijs-db
      DB_PORT: 5432
      DB_NAME: wiki
      DB_USER: ${WIKI_DB_USER}
      DB_PASS: ${WIKI_DB_PASSWORD}
    volumes:
      - ${APPDATA}/wikijs/data:/wiki/data
    ports:
       - 3000:3000
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TZ=${TZ}
    restart: unless-stopped
